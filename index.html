<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Modern Website</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f4f4;
        }

        header {
            background: #333;
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav {
            background: #555;
            display: flex;
            justify-content: center;
        }

        nav a {
            color: white;
            padding: 14px 20px;
            text-decoration: none;
        }

        nav a:hover {
            background: #222;
        }

        .container {
            padding: 20px;
            text-align: center;
        }

        .card {
            background: white;
            padding: 20px;
            margin: 15px;
            display: inline-block;
            width: 250px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 10px;
            margin-top: 20px;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .card {
                width: 90%;
            }
        }
    </style>
</head>

<body>

<header>
    <h1>My Website</h1>
    <p>Welcome to my modern webpage</p>
    <p>updated by bishru</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
</nav>

<div class="container">
    <h2>Our Services</h2>

    <div class="card">
        <h3>Web Design</h3>
        <p>We create beautiful websites.</p>
    </div>

    <div class="card">
        <h3>Development</h3>
        <p>Fast and secure web apps.</p>
    </div>

    <div class="card">
        <h3>Support</h3>
        <p>24/7 customer support.</p>
    </div>
</div>

<footer>
    <p>© 2026 My Website | All Rights Reserved</p>
</footer>

</body>
</html>
